name: Update CBA Schedule

on:
  schedule:
    # 每天 12:00 UTC (北京时间 20:00) 运行
    - cron: '0 12 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install iconv-lite

      - name: Update schedule data
        run: node update_schedule.js

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet cba_script.js; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cba_script.js
          git commit -m "Auto-update CBA schedule data [skip ci]"
          git push

      - name: Summary
        run: |
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ 数据已更新并推送到仓库"
          else
            echo "ℹ️ 没有新的数据更新"
          fi